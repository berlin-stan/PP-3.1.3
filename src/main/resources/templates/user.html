<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .user-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .user-info {
            margin: 20px 0;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
        }
        .info-row {
            margin: 10px 0;
            padding: 10px;
            border-bottom: 1px solid #dee2e6;
        }
        .info-label {
            font-weight: bold;
            color: #495057;
        }
    </style>
</head>
<body>
<!-- Top Black Bar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-text">
            <strong th:text="${#authentication.name}">user@mail.com</strong> with roles:
            <span th:each="role, stat : ${#authentication.authorities}"
                  th:text="${role.authority.replace('ROLE_', '')} + (not ${stat.last} ? ' ' : '')"></span>
        </span>
        <form th:action="@{/logout}" method="post" style="display: inline;">
            <button type="submit" class="btn btn-secondary btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container">
    <div class="user-container">
        <h1 class="text-center mb-4">User Information</h1>

        <div class="user-info" th:if="${user}">
            <div class="info-row">
                <span class="info-label">ID:</span>
                <span class="float-end" th:text="${user.id}">1</span>
            </div>
            <div class="info-row">
                <span class="info-label">First Name:</span>
                <span class="float-end" th:text="${user.firstName}">John</span>
            </div>
            <div class="info-row">
                <span class="info-label">Last Name:</span>
                <span class="float-end" th:text="${user.lastName}">Doe</span>
            </div>
            <div class="info-row">
                <span class="info-label">Age:</span>
                <span class="float-end" th:text="${user.age}">30</span>
            </div>
            <div class="info-row">
                <span class="info-label">Email:</span>
                <span class="float-end" th:text="${user.email}">user@mail.com</span>
            </div>
            <div class="info-row">
                <span class="info-label">Roles:</span>
                <span class="float-end"
                      th:each="role, iterStat : ${user.roles}"
                      th:text="${role.name.replace('ROLE_', '')} + (${iterStat.last} ? '' : ' ')">
                </span>
            </div>
        </div>

        <div class="text-center mt-4">
            <a th:href="@{/admin}" class="btn btn-primary" th:if="${#authentication.authorities.contains('ROLE_ADMIN')}">
                Go to Admin Panel
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
